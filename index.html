<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papa Bear's Little Lantern Cabin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'EB Garamond',serif;background:#0a0e1a;color:#f0e0c8;min-height:100vh;overflow-x:hidden}
#snowCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
#glowOverlay{position:fixed;inset:0;pointer-events:none;z-index:9998;transition:background 1.5s ease;background:radial-gradient(ellipse at center bottom,rgba(232,168,56,0.06),transparent 60%)}
#glowOverlay.warm{background:radial-gradient(ellipse at center bottom,rgba(232,168,56,0.14),transparent 60%)}
#glowOverlay.cool{background:radial-gradient(ellipse at center bottom,rgba(80,110,160,0.08),transparent 60%)}
#glowOverlay.bright{background:radial-gradient(ellipse at center bottom,rgba(232,168,56,0.22),transparent 55%)}
#warmthTracker{position:fixed;top:12px;right:12px;z-index:10000;display:none;flex-direction:column;align-items:center;gap:2px}
#warmthTracker.show{display:flex}
.wt-flame{width:14px;height:14px;background:#e8a838;border-radius:50%;box-shadow:0 0 12px #e8a838;animation:flicker 2s ease-in-out infinite alternate}
.wt-body{width:24px;height:40px;background:rgba(232,168,56,0.15);border:1px solid rgba(232,168,56,0.4);border-radius:3px 3px 6px 6px;overflow:hidden;position:relative}
.wt-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#e85a20,#e8a838);height:30%;transition:height 1s ease}
@keyframes flicker{0%{opacity:.85;box-shadow:0 0 10px #e8a838}50%{opacity:1;box-shadow:0 0 18px #f5c96a}100%{opacity:.9;box-shadow:0 0 12px #e8a838}}
.audio-bar{position:fixed;bottom:0;left:0;right:0;z-index:10000;background:rgba(15,8,2,0.95);border-top:1px solid rgba(232,168,56,0.15);display:flex;justify-content:center;gap:6px;padding:6px;flex-wrap:wrap}
.audio-btn{font-family:'EB Garamond',serif;font-size:.78rem;padding:4px 10px;background:rgba(232,168,56,0.12);color:#e8a838;border:1px solid rgba(232,168,56,0.25);border-radius:20px;cursor:pointer;transition:all .3s}
.audio-btn:hover,.audio-btn.on{background:rgba(232,168,56,0.3)}
#app{max-width:700px;margin:0 auto;padding:1rem 1rem 4rem;min-height:100vh}
.scene{animation:fadeIn 1s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.illo{width:100%;height:260px;margin:.5rem 0 1.5rem;background:linear-gradient(135deg,#1e1008,#2e1a0f,#1e1008);border:2px solid rgba(232,168,56,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;color:rgba(232,168,56,0.35);font-style:italic;font-size:.88rem;position:relative;overflow:hidden;text-align:center;padding:1rem}
.illo::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(232,168,56,0.06),transparent 70%)}
.title-wrap{text-align:center;padding:2rem 0 1rem}
.cabin-art{position:relative;width:240px;height:180px;margin:0 auto 1.5rem}
.ca-chimney{position:absolute;bottom:145px;right:35px;width:18px;height:35px;background:#3a1f0a;border-radius:2px 2px 0 0}
.ca-roof{position:absolute;bottom:105px;left:-10px;right:-10px;height:0;border-left:28px solid transparent;border-right:28px solid transparent;border-bottom:55px solid #2a1505}
.ca-body{position:absolute;bottom:0;left:10px;right:10px;height:100px;background:linear-gradient(135deg,#4a2a15,#3a1f0a);border-radius:3px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.ca-win{position:absolute;bottom:32px;width:24px;height:28px;background:#e8a838;border-radius:2px;box-shadow:0 0 20px #e8a838,0 0 40px rgba(232,168,56,0.25);animation:flicker 2.5s ease-in-out infinite alternate}
.ca-win.l{left:22px}.ca-win.r{right:22px}
.ca-door{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:26px;height:44px;background:#2a1505;border-radius:3px 3px 0 0}
.pine{position:absolute;bottom:0;width:0;height:0;border-left:solid transparent;border-right:solid transparent;border-bottom:solid #1a3a2a}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5.5vw,3.2rem);font-weight:300;color:#f5c96a;text-shadow:0 0 35px rgba(232,168,56,0.4);letter-spacing:.04em;line-height:1.2;margin-bottom:1.2rem}
.narr{font-size:clamp(1.02rem,2.5vw,1.22rem);line-height:2;color:#f0e0c8;margin-bottom:1.2rem}
.narr p{margin-bottom:.7rem}
.dlg{color:#f5c96a;font-style:italic}
.refl{color:#8ab4d0;font-style:italic;text-align:center;margin:1.4rem 0;font-size:1.08em;line-height:1.8}
.btn{display:inline-block;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;padding:.75rem 2.2rem;background:linear-gradient(135deg,#d4943a,#e8a838);color:#3a1f0a;border:none;border-radius:28px;cursor:pointer;transition:all .35s;box-shadow:0 4px 18px rgba(232,168,56,0.25);letter-spacing:.03em;margin:.4rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(232,168,56,0.45)}
.btn-ghost{background:rgba(232,168,56,0.12);color:#f5c96a;box-shadow:none;border:1px solid rgba(232,168,56,0.3)}
.btn-ghost:hover{background:rgba(232,168,56,0.25);box-shadow:0 4px 15px rgba(232,168,56,0.15)}
.choices{display:flex;flex-direction:column;gap:.7rem;margin:1.2rem 0}
.label{text-align:center;color:#e8a838;font-style:italic;margin-bottom:.3rem}
.ch-btn{font-family:'EB Garamond',serif;font-size:1.05rem;padding:.9rem 1.3rem;text-align:left;background:rgba(232,168,56,0.06);color:#f0e0c8;border:1px solid rgba(232,168,56,0.2);border-radius:10px;cursor:pointer;transition:all .35s;position:relative}
.ch-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#e8a838;opacity:0;transition:opacity .3s;border-radius:3px 0 0 3px}
.ch-btn:hover{background:rgba(232,168,56,0.14);border-color:rgba(232,168,56,0.45);transform:translateX(4px)}
.ch-btn:hover::before{opacity:1}
.obj-row{display:flex;flex-wrap:wrap;gap:.7rem;justify-content:center;margin:1.2rem 0}
.obj-btn{padding:.6rem 1rem;background:rgba(232,168,56,0.08);color:#f5c96a;border:1px dashed rgba(232,168,56,0.3);border-radius:8px;cursor:pointer;transition:all .4s;font-family:'EB Garamond',serif;font-size:1rem}
.obj-btn:hover{background:rgba(232,168,56,0.2);border-style:solid;box-shadow:0 0 12px rgba(232,168,56,0.15)}
.obj-btn.done{opacity:.45;cursor:default;border-style:dotted}
.reveal-box{background:rgba(232,168,56,0.05);border-left:3px solid #e8a838;padding:.7rem 1.1rem;margin:.6rem 0;border-radius:0 8px 8px 0;font-style:italic;font-size:1.02rem;line-height:1.7;animation:fadeIn .6s ease}
.doors{display:flex;flex-wrap:wrap;justify-content:center;gap:1.2rem;margin:1.5rem 0}
.ldoor{width:155px;padding:1.4rem .8rem;text-align:center;background:linear-gradient(180deg,#2a1808,#3a2515);border:2px solid rgba(232,168,56,0.25);border-radius:12px;cursor:pointer;transition:all .5s;position:relative}
.ldoor::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;background:#e8a838;border-radius:50%;box-shadow:0 0 16px #e8a838,0 0 35px rgba(232,168,56,0.25);animation:flicker 2.5s ease-in-out infinite alternate}
.ldoor:hover{border-color:#e8a838;transform:translateY(-4px);box-shadow:0 8px 25px rgba(232,168,56,0.18)}
.ldoor .di{font-size:1.8rem;margin-bottom:.4rem}
.ldoor .dl{font-family:'Cormorant Garamond',serif;font-size:1rem;color:#f5c96a}
.ldoor.visited{opacity:.4;pointer-events:none}
.ldoor.visited::after{content:'✓';position:absolute;top:6px;right:8px;color:#e8a838;font-size:.85rem}
.edoors{display:flex;flex-wrap:wrap;justify-content:center;gap:1rem;margin:1.5rem 0}
.edoor{width:148px;padding:1.1rem .7rem;text-align:center;background:rgba(232,168,56,0.06);border:1px solid rgba(232,168,56,0.2);border-radius:10px;cursor:pointer;transition:all .5s}
.edoor:hover{border-color:#e8a838;background:rgba(232,168,56,0.12);transform:translateY(-3px);box-shadow:0 6px 20px rgba(232,168,56,0.12)}
.edoor .ei{font-size:1.6rem;margin-bottom:.3rem}
.edoor .el{font-family:'Cormorant Garamond',serif;font-size:.92rem;color:#f5c96a;line-height:1.3}
.msg-area textarea{width:100%;padding:.8rem;margin-bottom:.6rem;background:rgba(232,168,56,0.05);border:1px solid rgba(232,168,56,0.2);border-radius:8px;color:#f0e0c8;font-family:'EB Garamond',serif;font-size:1.05rem;line-height:1.5;resize:vertical;min-height:60px}
.msg-area textarea::placeholder{color:rgba(232,168,56,0.35);font-style:italic}
.msg-area textarea:focus{outline:none;border-color:#e8a838;box-shadow:0 0 12px rgba(232,168,56,0.12)}
.float-lantern{width:180px;margin:1.5rem auto;position:relative;animation:bob 3s ease-in-out infinite alternate;display:none}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.fl-hook{width:2px;height:25px;background:rgba(232,168,56,0.4);margin:0 auto}
.fl-ring{width:26px;height:12px;border:2px solid rgba(232,168,56,0.4);border-radius:5px 5px 0 0;border-bottom:none;margin:0 auto}
.fl-flame{width:10px;height:14px;margin:0 auto;background:#e8a838;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;box-shadow:0 0 16px #e8a838,0 0 30px rgba(232,168,56,0.3);animation:flicker 2s ease-in-out infinite alternate}
.fl-glass{width:140px;min-height:100px;margin:4px auto 0;background:rgba(232,168,56,0.1);border:2px solid rgba(232,168,56,0.3);border-radius:6px 6px 12px 12px;padding:.8rem;text-align:center;box-shadow:0 0 30px rgba(232,168,56,0.2),inset 0 0 20px rgba(232,168,56,0.05)}
.fl-glass .umsg{font-style:italic;color:#f5c96a;font-size:.9rem;line-height:1.4;word-break:break-word}
.final-poem{font-family:'Cormorant Garamond',serif;font-size:clamp(1.05rem,2.8vw,1.3rem);color:#f5c96a;font-style:italic;text-align:center;line-height:2.2;max-width:460px;margin:1.5rem auto;text-shadow:0 0 15px rgba(232,168,56,0.15);display:none}
.center{text-align:center}
.mt1{margin-top:1rem}
.mt2{margin-top:1.8rem}
@media(max-width:500px){.ldoor{width:130px;padding:1rem .6rem}.edoor{width:130px}.illo{height:190px}}
</style>
</head>
<body>
<canvas id="snowCanvas"></canvas>
<div id="glowOverlay"></div>
<div id="warmthTracker"><div class="wt-flame" id="wtFlame"></div><div class="wt-body"><div class="wt-fill" id="wtFill"></div></div></div>
<div class="audio-bar">
<button class="audio-btn" onclick="this.classList.toggle('on')">🔊 Read to Me</button>
<button class="audio-btn" onclick="this.classList.toggle('on')">🎵 Soft Music</button>
<button class="audio-btn" onclick="this.classList.toggle('on')">🏮 Lantern Sound</button>
<button class="audio-btn" onclick="this.classList.toggle('on')">🔥 Fireplace</button>
</div>
<div id="app"></div>
<script>
var C=document.getElementById('snowCanvas'),X=C.getContext('2d'),flakes=[];
function szC(){C.width=innerWidth;C.height=innerHeight}
addEventListener('resize',szC);szC();
for(var i=0;i<100;i++)flakes.push({x:Math.random()*C.width,y:Math.random()*C.height,r:Math.random()*2.2+.5,s:Math.random()*.8+.2,w:Math.random()*.4-.2,o:Math.random()*.5+.2});
function drawSnow(){X.clearRect(0,0,C.width,C.height);for(var i=0;i<flakes.length;i++){var f=flakes[i];X.beginPath();X.arc(f.x,f.y,f.r,0,Math.PI*2);X.fillStyle='rgba(225,230,240,'+f.o+')';X.fill();f.y+=f.s;f.x+=f.w+Math.sin(Date.now()*.001+f.x)*.15;if(f.y>C.height+5){f.y=-5;f.x=Math.random()*C.width}if(f.x>C.width+5)f.x=-5;if(f.x<-5)f.x=C.width+5}requestAnimationFrame(drawSnow)}
drawSnow();

var warmth=30,visited=[];
try{visited=JSON.parse(localStorage.getItem('pb_doors')||'[]')}catch(e){visited=[]}
var app=document.getElementById('app');
var glow=document.getElementById('glowOverlay');
var wt=document.getElementById('warmthTracker');
var wtFill=document.getElementById('wtFill');
var wtFlame=document.getElementById('wtFlame');

function setWarmth(v){warmth=Math.max(10,Math.min(100,v));wtFill.style.height=warmth+'%';if(warmth>70){glow.className='bright';wtFlame.style.boxShadow='0 0 18px #f5c96a,0 0 30px #e8a838'}else if(warmth>42){glow.className='warm';wtFlame.style.boxShadow='0 0 12px #e8a838'}else{glow.className='cool';wtFlame.style.boxShadow='0 0 6px rgba(232,168,56,0.4)'}}

function S(html){app.innerHTML='<div class="scene">'+html+'</div>';window.scrollTo({top:0,behavior:'smooth'})}

function mkObjs(cid,rid,items,thresh,nid){
var count=0,row=document.getElementById(cid);if(!row)return;
for(var i=0;i<items.length;i++){(function(item){
var b=document.createElement('button');b.className='obj-btn';b.textContent=item.n;
b.addEventListener('click',function(){if(b.classList.contains('done'))return;b.classList.add('done');
var d=document.createElement('div');d.className='reveal-box';d.textContent=item.t;
document.getElementById(rid).appendChild(d);setWarmth(warmth+3);count++;
if(thresh>0&&count>=thresh&&nid){var nx=document.getElementById(nid);if(nx)nx.style.display='block'}});
row.appendChild(b)})(items[i])}
}

function showTitle(){
wt.classList.remove('show');
S('<div class="title-wrap"><div class="cabin-art"><div class="pine" style="left:2%;border-left-width:16px;border-right-width:16px;border-bottom-width:75px;opacity:.55"></div><div class="pine" style="left:14%;border-left-width:12px;border-right-width:12px;border-bottom-width:58px;opacity:.45"></div><div class="pine" style="right:5%;border-left-width:18px;border-right-width:18px;border-bottom-width:85px;opacity:.5"></div><div class="pine" style="right:18%;border-left-width:11px;border-right-width:11px;border-bottom-width:50px;opacity:.4"></div><div class="pine" style="left:32%;border-left-width:14px;border-right-width:14px;border-bottom-width:65px;opacity:.35"></div><div class="ca-chimney"></div><div class="ca-roof"></div><div class="ca-body"><div class="ca-win l"></div><div class="ca-win r"></div><div class="ca-door"></div></div></div><h1>Papa Bear\'s<br>Little Lantern Cabin</h1><div class="narr" style="text-align:center;max-width:540px;margin:0 auto"><p>Once, beyond the snowy pines and the blue hills of Lantern Hollow, there lived a gentle bear called Papa Bear.</p><p>His cabin was not large.</p><p>It did not have long hallways.<br>It did not have shining staircases.<br>It did not have rooms that echoed when little paws ran through them.</p><p>But every time his cubs were coming, Papa Bear made the little cabin ready.</p><p>He swept the floor. He warmed the soup.<br>He folded the blankets. He placed two cups on the table.</p><p>And in the window, he lit two lanterns.<br>One for Clover. One for Pip.</p></div><div class="center mt2"><button class="btn" onclick="scene1()">Begin the Story</button></div></div>')}

function scene1(){wt.classList.add('show');setWarmth(warmth);
S('<div class="illo">[ Papa Bear at the cabin door — snow falling — Clover and Pip arriving ]</div><div class="narr"><p>When Clover and Pip came to the little cabin, Papa Bear opened the door before they even knocked.</p><p><span class="dlg">"I heard your paws in the snow,"</span> he said with a smile.</p><p>The cabin smelled like soup, pinewood, and warm bread.</p><p>Pip looked around. The table was small. The rug was small. The sleeping corner was small.</p><p>Pip frowned.</p><p><span class="dlg">"This cabin is little,"</span> she said.</p><p>Papa Bear\'s smile stayed soft.</p><p><span class="dlg">"Yes, little cub,"</span> he said. <span class="dlg">"But I warmed every corner I could find."</span></p></div><div class="choices"><div class="label">What should Pip say next?</div><button class="ch-btn" onclick="s1c(1)">"I don\'t like it here."</button><button class="ch-btn" onclick="s1c(2)">"I miss having more room."</button><button class="ch-btn" onclick="s1c(3)">"Can we make this corner cozy?"</button></div>')}

function s1c(n){var t='';if(n===1){setWarmth(warmth-10);t='<p>Pip says, <span class="dlg">"I don\'t like it here."</span></p><p>The fire crackles softly.</p><p>Papa Bear looks at the soup pot for one quiet second.</p><p>Then he says, <span class="dlg">"You must be hungry from the walk."</span></p><p>He places her favorite cup on the table.</p><p class="refl">Sharp words can make a warm room feel colder.<br>But Papa Bear still kept the soup warm.</p>'}else if(n===2){setWarmth(warmth+5);t='<p>Pip says, <span class="dlg">"I miss having more room."</span></p><p>Papa Bear nods.</p><p><span class="dlg">"That is an honest feeling,"</span> he says. <span class="dlg">"We can hold honest feelings gently."</span></p><p>He moves a cushion closer to the fire.</p><p class="refl">Honest words are easier to hold than sharp ones.</p>'}else{setWarmth(warmth+15);t='<p>Pip says, <span class="dlg">"Can we make this corner cozy?"</span></p><p>Papa Bear\'s eyes brighten.</p><p><span class="dlg">"I was hoping you might ask."</span></p><p>He brings out a folded blanket with tiny stitched stars.</p><p class="refl">Sometimes one kind question makes a little room begin to grow.</p>'}
S('<div class="illo">[ The cabin interior — fire crackling ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="scene2()">Continue</button></div>')}

function scene2(){
S('<div class="illo">[ Flashback: Papa Bear alone, preparing the cabin ]</div><div class="narr"><p>Before Clover and Pip came through the snow, Papa Bear had been busy all morning.</p><p>He tasted the soup.<br><span class="dlg">"Too much pepper for Pip,"</span> he murmured.<br>He added more noodles.<br><span class="dlg">"Clover likes noodles when the day is cold."</span></p><p>He checked the boots by the fire. He shook out the blankets. He looked at the two little cups.</p><p>Then he looked at the door. The cabin was very quiet.</p><p>So Papa Bear lit the two lanterns in the window.<br>Not because anyone was lost.<br>But because someone was welcome.</p></div><p class="label center" style="color:#e8a838;margin-bottom:.5rem">Click each object to discover what Papa Bear was thinking:</p><div class="obj-row" id="s2o"></div><div id="s2r"></div><div id="s2n" style="display:none"><p class="refl">Some kinds of love happen before anyone is there to see them.</p><div class="center"><button class="btn" onclick="lanternDoors()">Open a Lantern Door</button></div></div>');
mkObjs('s2o','s2r',[{n:'🍲 Soup Pot',t:'Papa Bear remembered that Pip liked her carrots cut small.'},{n:'🥾 Boots',t:'Papa Bear remembered that Clover\'s paws got cold last time.'},{n:'🛏️ Blankets',t:'Papa Bear chose the softest one because Pip once said the wool blanket scratched her chin.'},{n:'☕ Two Cups',t:'Papa Bear kept the little blue cup and the little green cup on the highest shelf so they would not break.'},{n:'🏮 Lanterns',t:'Papa Bear lit one lantern for each cub, even before they arrived.'}],3,'s2n')}

function lanternDoors(){var h='<div class="narr center"><p>Three doors appear in the golden light of the cabin.</p><p class="refl">Tonight, you may open one door.<br>Tomorrow, you can come back and open another.</p></div><div class="doors">';
var ds=[{id:'A',icon:'🍲',label:'The Soup Door'},{id:'B',icon:'🌲',label:'The Forest Door'},{id:'C',icon:'⭐',label:'The Star Door'}];
for(var i=0;i<ds.length;i++){var d=ds[i],vis=visited.indexOf(d.id)!==-1;h+='<div class="ldoor'+(vis?' visited':'')+'" onclick="'+(vis?'':'openDoor(\''+d.id+'\')')+'"><div class="di">'+d.icon+'</div><div class="dl">'+d.label+'</div></div>'}
h+='</div>';S(h)}

function openDoor(id){if(visited.indexOf(id)===-1){visited.push(id);localStorage.setItem('pb_doors',JSON.stringify(visited))}if(id==='A')pathA1();else if(id==='B')pathB1();else pathC1()}

function pathA1(){S('<div class="illo">[ Small table — warm bowls — soup steam ]</div><div class="narr"><p>Papa Bear carried the soup carefully.</p><p>Pip looked into her bowl.<br>The carrots were cut into tiny moons.<br>The noodles curled like little ribbons.</p><p>Clover looked into her bowl.<br>Extra noodles. Just the way she liked them.</p><p>Pip blinked.<br><span class="dlg">"How did you know?"</span></p><p>Papa Bear chuckled.<br><span class="dlg">"You told me once."</span></p><p><span class="dlg">"I did?"</span></p><p><span class="dlg">"Yes,"</span> said Papa Bear. <span class="dlg">"On a rainy day. You said big carrots were too bossy."</span></p><p>Pip stared at the bowl. She had forgotten saying it.<br>Papa Bear had not.</p></div><div class="choices"><div class="label">What should Pip do?</div><button class="ch-btn" onclick="a1c(1)">Eat without saying anything.</button><button class="ch-btn" onclick="a1c(2)">Say, "You remembered?"</button><button class="ch-btn" onclick="a1c(3)">Say, "Can I help stir next time?"</button></div>')}

function a1c(n){var t='';if(n===1){setWarmth(warmth+3);t='<p>Pip eats quietly.</p><p>Papa Bear does not ask for praise.</p><p>But Clover notices that his shoulders relax when Pip takes another spoonful.</p><p class="refl">Even quiet noticing can begin inside the heart.</p>'}else if(n===2){setWarmth(warmth+12);t='<p>Pip whispers, <span class="dlg">"You remembered?"</span></p><p>Papa Bear smiles.</p><p><span class="dlg">"I try to keep important things in my heart."</span></p><p>The lantern on the table glows brighter.</p><p class="refl">A remembered thing can feel like a hug.</p>'}else{setWarmth(warmth+18);t='<p>Pip says, <span class="dlg">"Can I help stir next time?"</span></p><p>Papa Bear\'s big paws pause.</p><p>Then he hands her the wooden spoon.</p><p><span class="dlg">"Next time can begin now,"</span> he says.</p><p class="refl">The soup steam curls upward, and for just a moment, it forms the shape of a small heart before it disappears.</p>'}
S('<div class="illo">[ Pip and the soup bowl ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="pathA2()">Continue the Soup Path</button></div>')}

function pathA2(){S('<div class="illo">[ Two small cups on a high shelf — one blue, one green ]</div><div class="narr"><p>After supper, Clover noticed something high on the shelf.</p><p>Two little cups. One blue. One green.</p><p><span class="dlg">"Papa,"</span> Clover asked, <span class="dlg">"why do you keep those cups up there?"</span></p><p>Papa Bear looked almost shy.<br><span class="dlg">"So they will be safe for when you come."</span></p><p>Pip looked at her green cup.<br><span class="dlg">"You keep them even when we are not here?"</span></p><p>Papa Bear nodded.<br><span class="dlg">"The cabin remembers you with me."</span></p></div><div class="obj-row" id="a2o"></div><div id="a2r"></div><div class="choices mt1"><div class="label">What could Clover say?</div><button class="ch-btn" onclick="a2c(1)">"It\'s just a cup."</button><button class="ch-btn" onclick="a2c(2)">"You saved it for us?"</button><button class="ch-btn" onclick="a2c(3)">"Can we draw a picture to put beside them?"</button></div>');
mkObjs('a2o','a2r',[{n:'🟢 Green Cup',t:'Papa Bear washed it twice because he wanted it to shine.'},{n:'🔵 Blue Cup',t:'Papa Bear kept it safe after Clover once said it felt like holding a piece of sky.'}],0,null)}

function a2c(n){var t='';if(n===1){setWarmth(warmth-5);t='<p>Papa Bear nods, but the room becomes quieter.</p><p>He places the cup back on the shelf, carefully.</p><p class="refl">Some things hold more than what we first see.</p>'}else if(n===2){setWarmth(warmth+12);t='<p>Clover whispers, <span class="dlg">"You saved it for us?"</span></p><p>The lantern glows brighter.</p><p>Papa Bear smiles. <span class="dlg">"Always."</span></p><p class="refl">A kept thing is a kind of promise.</p>'}else{setWarmth(warmth+18);t='<p>Papa Bear\'s face lights up.</p><p><span class="dlg">"What a wonderful idea."</span></p><p>Clover draws a tiny picture of the cabin. Pip draws a wobbly duck.</p><p>Papa Bear places both drawings on the shelf beside the cups.</p><p class="refl">A shelf can hold more than cups. It can hold belonging.</p>'}
S('<div class="illo">[ The shelf with the two cups ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="interlude()">Continue</button></div>')}

function pathB1(){S('<div class="illo">[ Snowy forest path — Papa Bear with a small backpack ]</div><div class="narr"><p>The next morning, Pip pressed her nose to the window.</p><p><span class="dlg">"It is boring here,"</span> she said.</p><p>Papa Bear tied his scarf.<br><span class="dlg">"Then we must go where the trees keep secrets."</span></p><p>He opened the door. Outside, the snow glittered.</p><p>Clover noticed Papa Bear\'s backpack.<br>Inside were apples, warm mittens, a tiny map, and two honey cakes wrapped in cloth.</p><p><span class="dlg">"Did you pack all that today?"</span> Clover asked.</p><p>Papa Bear smiled.<br><span class="dlg">"Last night."</span></p></div><p class="label center" style="color:#e8a838">Click each item to discover Papa Bear\'s thoughts:</p><div class="obj-row" id="b1o"></div><div id="b1r"></div><div class="choices mt1"><div class="label">What should the cubs say?</div><button class="ch-btn" onclick="b1c(1)">"How far is it?"</button><button class="ch-btn" onclick="b1c(2)">"You planned this for us?"</button><button class="ch-btn" onclick="b1c(3)">"Can we choose the first turn?"</button></div>');
mkObjs('b1o','b1r',[{n:'🎒 Backpack',t:'Papa Bear packed extra mittens because Pip always loses one.'},{n:'🗺️ Map',t:'Papa Bear drew the path himself, marking a spot where he once saw a family of ducks.'},{n:'🍯 Honey Cakes',t:'Papa Bear saved the last honey to make them.'},{n:'🍎 Apples',t:'Papa Bear cut them small because Clover\'s tooth was loose last winter.'}],0,null)}

function b1c(n){var t='';if(n===1){setWarmth(warmth+3);t='<p>Papa Bear answers kindly, <span class="dlg">"Not too far for tired paws."</span></p><p>He holds out his big paw, and Clover takes it.</p>'}else if(n===2){setWarmth(warmth+12);t='<p>Papa Bear smiles.</p><p><span class="dlg">"I thought the cabin might feel bigger if we carried our love outside."</span></p><p class="refl">Love does not always stay indoors.</p>'}else{setWarmth(warmth+10);t='<p>Papa Bear bows playfully.</p><p><span class="dlg">"Lead the way, brave cubs."</span></p><p>Pip marches forward. Clover follows. Papa Bear watches them with eyes full of quiet joy.</p>'}
S('<div class="illo">[ The three bears on the snowy path ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="pathB2()">Continue the Forest Path</button></div>')}

function pathB2(){S('<div class="illo">[ Frozen pond — ducks waddling — forest opening ]</div><div class="narr"><p>At the end of the path, the forest opened to a frozen pond.</p><p>Near the reeds, ducks waddled in a sleepy line.</p><p>Pip gasped.<br><span class="dlg">"Ducks!"</span></p><p>Papa Bear laughed.<br><span class="dlg">"You told me you liked them."</span></p><p><span class="dlg">"When?"</span></p><p><span class="dlg">"In spring,"</span> said Papa Bear. <span class="dlg">"You saw one with a green head and said it looked like a king."</span></p><p>Pip stared at the ducks. The pond sparkled.<br>She had forgotten. Papa Bear had not.</p></div><div class="choices"><div class="label">What should Pip do now?</div><button class="ch-btn" onclick="b2c(1)">Run ahead without looking back.</button><button class="ch-btn" onclick="b2c(2)">Look at Papa Bear and smile.</button><button class="ch-btn" onclick="b2c(3)">Ask Papa Bear to tell the duck story again.</button></div>')}

function b2c(n){var t='';if(n===1){setWarmth(warmth+2);t='<p>Pip runs ahead. Papa Bear watches carefully to make sure she does not slip.</p><p class="refl">Even when Pip forgot to look back, Papa Bear was still watching over her.</p>'}else if(n===2){setWarmth(warmth+14);t='<p>Pip smiles at Papa Bear.</p><p>The pond shines gold.</p><p class="refl">A smile can tell someone, "I see what you did."</p>'}else{setWarmth(warmth+16);t='<p>Papa Bear tells the duck story with a silly duck voice.</p><p>Clover laughs so hard she falls into the snow.</p><p>Pip laughs until her belly aches.</p><p>The ducks, offended, waddle away with great dignity.</p><p class="refl">Laughter shared is a room without walls.</p>'}
S('<div class="illo">[ The frozen pond — golden sparkle ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="interlude()">Continue</button></div>')}

function pathC1(){S('<div class="illo">[ Sleeping corner — paper stars hanging from strings ]</div><div class="narr"><p>That night, when the fire was low, Clover looked up.</p><p>Above the sleeping corner were paper stars.<br>Some were silver. Some were gold. Some were crooked.<br>One looked more like a potato than a star.</p><p>Clover sat up.<br><span class="dlg">"Papa?"</span></p><p>Papa Bear turned from the fire.<br><span class="dlg">"Yes?"</span></p><p><span class="dlg">"Did you make those?"</span></p><p>Papa Bear rubbed the back of his neck.<br><span class="dlg">"I tried."</span></p><p>Pip squinted.<br><span class="dlg">"They are not real stars."</span></p><p>Papa Bear nodded.<br><span class="dlg">"No,"</span> he said. <span class="dlg">"I could not bring the real ones inside."</span></p><p>He looked up at the little crooked stars.<br><span class="dlg">"So I made the kind I could reach."</span></p></div><p class="label center" style="color:#e8a838">Click each star:</p><div class="obj-row" id="c1o"></div><div id="c1r"></div><div class="choices mt1"><div class="label">What should Clover say?</div><button class="ch-btn" onclick="c1c(1)">"They are not real."</button><button class="ch-btn" onclick="c1c(2)">"You remembered I liked stars?"</button><button class="ch-btn" onclick="c1c(3)">"Can we make more together?"</button></div>');
mkObjs('c1o','c1r',[{n:'✨ Gold Star',t:'Papa Bear cut this one three times because the first two tore.'},{n:'🌟 Silver Star',t:'Papa Bear made this one after Clover said she liked the night sky.'},{n:'⭐ Crooked Star',t:'Papa Bear almost threw this one away, but then he thought it looked cheerful.'}],0,null)}

function c1c(n){var t='';if(n===1){setWarmth(warmth-3);t='<p>Papa Bear smiles gently.</p><p><span class="dlg">"No, little cub. But they are real paper. And real trying."</span></p><p class="refl">Trying is its own kind of light.</p>'}else if(n===2){setWarmth(warmth+14);t='<p>The lantern glows.</p><p>Papa Bear says, <span class="dlg">"I remember more than you think."</span></p><p class="refl">Being remembered is one of the deepest kinds of being loved.</p>'}else{setWarmth(warmth+20);t='<p>Papa Bear brings out paper, scissors, and string.</p><p>The three bears sit by the fire, cutting and folding.</p><p>The ceiling slowly fills with more stars.</p><p>Some are beautiful. Some are lumpy. One looks like a fish.</p><p>They all shine.</p><p class="refl">Love made together fills the sky faster.</p>'}
S('<div class="illo">[ The paper stars — firelight ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="pathC2()">Continue the Star Path</button></div>')}

function pathC2(){setWarmth(warmth+8);
S('<div class="illo">[ Cubs sleeping — Papa Bear sitting by the low fire ]</div><div class="narr"><p>When the cubs fell asleep, Papa Bear did not sleep right away.</p><p>He tucked the blanket around Clover\'s paws.<br>He moved Pip\'s cup away from the edge of the table.<br>He placed one more log on the fire.</p><p>Then he sat quietly.</p><p>The cabin was small.<br>But with the cubs inside it, Papa Bear felt as if the whole sky had come home.</p><p>He whispered, so softly only the lantern heard:</p><p><span class="dlg">"I hope they know."</span></p><p>The lantern flickered.</p><p><span class="dlg">"I hope they know how much."</span></p></div><div class="center mt1"><button class="btn" onclick="interlude()">Continue</button></div>')}

function interlude(){S('<div class="illo">[ Clover and Pip whispering under the paper stars ]</div><div class="narr"><p>Later, when Papa Bear was washing the bowls, Clover and Pip whispered under the paper stars.</p><p>Pip said, <span class="dlg">"I still wish the cabin were bigger."</span></p><p>Clover nodded. <span class="dlg">"Me too."</span></p><p>Pip pulled the blanket to her chin.<br><span class="dlg">"But he remembered the ducks."</span></p><p><span class="dlg">"And the soup,"</span> said Clover.</p><p><span class="dlg">"And the stars."</span></p><p><span class="dlg">"And the cups."</span></p><p>Pip was quiet for a while.</p><p>Then she said:<br><span class="dlg">"Do you think Papa thinks about us when we are not here?"</span></p><p>Clover looked at the two lanterns in the window.</p><p><span class="dlg">"I think,"</span> she whispered, <span class="dlg">"that is why the lanterns are already lit."</span></p></div><div class="choices"><div class="label">What should Pip whisper back?</div><button class="ch-btn" onclick="intC(1)">"Maybe."</button><button class="ch-btn" onclick="intC(2)">"I did not know he did all that."</button><button class="ch-btn" onclick="intC(3)">"Tomorrow, maybe we can do something for him."</button></div>')}

function intC(n){var t='';if(n===1){setWarmth(warmth+3);t='<p>Pip whispers, <span class="dlg">"Maybe."</span></p><p>But she looked at the lanterns for a long time before she closed her eyes.</p>'}else if(n===2){setWarmth(warmth+10);t='<p>Pip whispers, <span class="dlg">"I did not know he did all that."</span></p><p>Clover nods.</p><p><span class="dlg">"I think there is more we have not seen yet."</span></p>'}else{setWarmth(warmth+18);t='<p>Pip whispers, <span class="dlg">"Tomorrow, maybe we can do something for him."</span></p><p>Clover smiles in the dark.</p><p><span class="dlg">"I think he would like that very much."</span></p><p>The lanterns in the window seemed to glow just a little brighter.</p>'}
S('<div class="illo">[ The cubs whispering — lanterns in the window ]</div><div class="narr">'+t+'</div><div class="center mt1"><button class="btn" onclick="finalDoors()">Continue</button></div>')}

function finalDoors(){S('<div class="narr"><p>By the end of the night, the cabin had not become bigger.</p><p>The table was still small. The rug was still small. The sleeping corner was still small.</p><p>But Clover and Pip had begun to see things they had not seen before.</p><p>The soup that remembered. The boots by the fire. The cups on the shelf. The stars Papa Bear could reach. The ducks he had remembered. The lanterns he lit before they arrived.</p><p>Then, in the golden light, four little doors appeared.</p><p class="refl">When love has been waiting quietly, how will you answer it?</p></div><div class="edoors"><div class="edoor" onclick="ending(1)"><div class="ei">🤫</div><div class="el">Sit close to Papa Bear</div></div><div class="edoor" onclick="ending(2)"><div class="ei">💛</div><div class="el">Tell Papa Bear what you noticed</div></div><div class="edoor" onclick="ending(3)"><div class="ei">🥞</div><div class="el">Do something kind for Papa Bear</div></div><div class="edoor" onclick="ending(4)"><div class="ei">🕊️</div><div class="el">Use softer words</div></div></div>')}

function ending(n){var t='',ill='';
if(n===1){setWarmth(90);ill='Cubs sitting close to Papa Bear by the fire';t='<p>Pip did not know what to say. Clover did not know either.</p><p>So they did not say anything at first.</p><p>They padded across the rug and sat beside Papa Bear.</p><p>Papa Bear looked down.<br><span class="dlg">"Are you warm enough, little cubs?"</span></p><p>Pip nodded.<br>Clover leaned against his arm.<br>Pip leaned against the other.</p><p>Papa Bear became very still, as if he did not want to move too quickly and break the moment.</p><p>The fire crackled. The lanterns glowed.</p><p>The cabin was still little.<br>But now it felt full.</p><p class="refl">Sometimes love does not need a big speech.<br>Sometimes sitting close is the first thank-you.</p>'}
else if(n===2){setWarmth(95);ill='Cubs naming all the things they noticed';t='<p>Pip looked at the soup pot.<br><span class="dlg">"You remembered the carrots."</span></p><p>Clover pointed to the boots.<br><span class="dlg">"And you dried our boots."</span></p><p>Pip looked up.<br><span class="dlg">"You made the stars."</span></p><p>Clover touched the little blue cup.<br><span class="dlg">"And you kept our cups safe."</span></p><p>Papa Bear\'s big paws rested on the table.<br>For a moment, he did not speak.</p><p>Then he said softly:<br><span class="dlg">"I tried."</span></p><p>Pip stepped closer.<br><span class="dlg">"I didn\'t see it before."</span></p><p>Clover whispered:<br><span class="dlg">"We see it now."</span></p><p>Papa Bear\'s eyes shone like lantern glass.<br>He opened his arms.<br>The cubs ran into them.</p><p class="refl">A thank-you becomes powerful<br>when it names the love it noticed.</p>'}
else if(n===3){setWarmth(95);ill='Cubs making a messy breakfast for Papa Bear';t='<p>The next morning, Papa Bear woke to a strange sound.</p><p><em>Clink. Tap. Whisper.</em></p><p>He opened one eye.</p><p>Clover was folding napkins.<br>Pip was placing cups on the table.</p><p>The honey jar was upside down, and one spoon was stuck to the floor.</p><p>Papa Bear sat up.<br><span class="dlg">"What is happening here?"</span></p><p>Pip stood proudly.<br><span class="dlg">"We are making breakfast."</span></p><p>Clover added, <span class="dlg">"Not perfect breakfast."</span></p><p>Pip held up a pancake shaped like a boot.<br><span class="dlg">"Special breakfast."</span></p><p>Papa Bear laughed.<br>It was the kind of laugh that warmed the windows.</p><p>The pancakes were lumpy. The table was sticky. The tea was too weak.</p><p>But Papa Bear ate as if it were a feast in a palace.</p><p class="refl">Love grows when everyone gets to give something.</p>'}
else{setWarmth(98);ill='Pip speaking softly to Papa Bear by the fire';t='<p><span class="dlg">"Papa Bear?"</span></p><p><span class="dlg">"Yes, little cub?"</span></p><p><span class="dlg">"I said your cabin was too small."</span></p><p>Papa Bear smiled gently.<br><span class="dlg">"It is small."</span></p><p>Pip shook her head.<br><span class="dlg">"But I said it with little teeth."</span></p><p>The fire crackled.</p><p><span class="dlg">"I think I was missing other things,"</span> Pip said. <span class="dlg">"But I made it sound like your cabin was the problem."</span></p><p>Papa Bear knelt beside her.<br><span class="dlg">"Big feelings sometimes come out with little teeth."</span></p><p>Pip\'s ears lowered.<br><span class="dlg">"I can try softer words."</span></p><p>Papa Bear opened his arms.<br><span class="dlg">"That is a very brave try."</span></p><p>Clover joined the hug.</p><p>The lanterns in the window glowed brighter than they had all winter.</p><p class="refl">A soft word can turn a little room warm again.</p>'}
S('<div class="illo">[ '+ill+' ]</div><div class="narr">'+t+'</div><div class="center mt2"><button class="btn" onclick="lanternMsg()">Keep this ending</button> <button class="btn btn-ghost" onclick="finalDoors()">Choose another door</button></div>')}

function lanternMsg(){S('<div class="center"><h1 style="font-size:clamp(1.4rem,4vw,2rem)">Leave a Lantern Message</h1><p style="font-style:italic;margin-bottom:1.2rem;font-size:1.05rem">If you were one of Papa Bear\'s cubs, what would you say?</p></div><div class="msg-area"><textarea id="m1" placeholder="Papa Bear, I noticed that you…" rows="2"></textarea><textarea id="m2" placeholder="One kind thing I could say next time is…" rows="2"></textarea><textarea id="m3" placeholder="One thing we could do together is…" rows="2"></textarea></div><div class="center mt1"><button class="btn" onclick="lightLantern()">🏮 Light My Lantern</button></div><div class="float-lantern" id="fL"><div class="fl-hook"></div><div class="fl-ring"></div><div class="fl-flame"></div><div class="fl-glass"><div class="umsg" id="uM"></div></div></div><div class="final-poem" id="fP"><p>And so the little cabin kept glowing.</p><p>Not because it was big.</p><p>Not because it was perfect.</p><p>But because love had been seen.</p><p>And once love is seen,<br>it shines differently forever.</p></div><div class="center" id="rA" style="display:none"><button class="btn" onclick="location.reload()">Return to the Cabin Another Night</button></div>')}

function lightLantern(){var e1=document.getElementById('m1');if(!e1)return;var msgs=[e1.value,document.getElementById('m2').value,document.getElementById('m3').value].filter(function(m){return m.trim()}).join(' ✦ ');if(!msgs){e1.style.borderColor='#e85a20';setTimeout(function(){var x=document.getElementById('m1');if(x)x.style.borderColor='rgba(232,168,56,0.2)'},2000);return}document.getElementById('uM').textContent=msgs;document.getElementById('fL').style.display='block';setWarmth(100);setTimeout(function(){var fp=document.getElementById('fP');if(fp){fp.style.display='block';fp.style.animation='fadeIn 2s ease'}},1500);setTimeout(function(){var ra=document.getElementById('rA');if(ra){ra.style.display='block';ra.style.animation='fadeIn 1s ease'}},3500)}

showTitle();
</script>
